name: Auto Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    # Only run when PR is merged (not just closed) AND has a valid release label
    if: >
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.labels.*.name, 'release') ||
        contains(github.event.pull_request.labels.*.name, 'release:patch') ||
        contains(github.event.pull_request.labels.*.name, 'release:minor') ||
        contains(github.event.pull_request.labels.*.name, 'release:major')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version-file: ".python-version"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # --- Determine bump type ---

      - name: Determine bump type
        id: bump
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"release:major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"release:minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # --- Sync with latest main (before modifying files) ---

      - name: Pull latest main
        run: git pull --rebase origin main

      # --- Bump version ---

      - name: Bump version
        id: version
        run: |
          python - "${{ steps.bump.outputs.type }}" <<'PYEOF'
          import re, sys

          bump_type = sys.argv[1]

          # Read current version from pyproject.toml
          with open("pyproject.toml") as f:
              text = f.read()

          match = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text, re.MULTILINE)
          if not match:
              print("ERROR: could not find version in pyproject.toml", file=sys.stderr)
              sys.exit(1)

          major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))
          old_version = f"{major}.{minor}.{patch}"

          if bump_type == "major":
              major += 1; minor = 0; patch = 0
          elif bump_type == "minor":
              minor += 1; patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"

          # Update pyproject.toml
          text = text.replace(f'version = "{old_version}"', f'version = "{new_version}"', 1)
          assert f'version = "{new_version}"' in text, "Failed to update pyproject.toml"
          with open("pyproject.toml", "w") as f:
              f.write(text)

          # Update __init__.py fallback
          init_path = "cloudwire/__init__.py"
          with open(init_path) as f:
              init_text = f.read()
          init_text = init_text.replace(f'__version__ = "{old_version}"', f'__version__ = "{new_version}"')
          assert f'__version__ = "{new_version}"' in init_text, \
              f"Failed to update {init_path} — expected __version__ = \"{old_version}\" but it was not found"
          with open(init_path, "w") as f:
              f.write(init_text)

          print(f"{old_version} -> {new_version}")

          with open(__import__('os').environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"old={old_version}\n")
              f.write(f"new={new_version}\n")
          PYEOF

      # --- Commit, tag, and push ---

      - name: Commit and tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml cloudwire/__init__.py
          git commit -m "chore: bump version ${{ steps.version.outputs.old }} → ${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin main --follow-tags

      # --- Build ---

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install build tools
        run: pip install --upgrade build setuptools wheel

      - name: Build Python package
        run: python -m build

      - name: Verify wheel metadata and static assets
        run: |
          python - <<'EOF'
          import zipfile, sys
          from pathlib import Path

          whl = next(Path('dist').glob('*.whl'))

          with zipfile.ZipFile(whl) as z:
              names = z.namelist()

              # Check metadata
              metadata_files = [n for n in names if n.endswith('/METADATA')]
              if not metadata_files:
                  print("ERROR: No METADATA file found in wheel!", file=sys.stderr)
                  sys.exit(1)

              metadata = z.read(metadata_files[0]).decode()
              if 'Name:' not in metadata or 'Version:' not in metadata:
                  print(f"ERROR: METADATA missing Name or Version:\n{metadata[:500]}", file=sys.stderr)
                  sys.exit(1)

              # Check static assets
              has_html = any('static/index.html' in n for n in names)
              has_js = any('static/assets' in n and n.endswith('.js') for n in names)
              if not (has_html and has_js):
                  print("ERROR: static assets missing from wheel!", file=sys.stderr)
                  sys.exit(1)

          print(f"OK: {whl.name} — metadata and static assets verified.")
          EOF

      # --- Publish ---

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ec4db0b4ddc65acdf4bff5fa45ac92d78b56bdf0 # v1.9.0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.new }}" \
            --title "v${{ steps.version.outputs.new }}" \
            --generate-notes \
            dist/*

      # --- Cleanup on failure ---
      # If the build or publish fails after the tag was pushed, delete the tag
      # so the next attempt doesn't collide.

      - name: Cleanup tag on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.new }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Deleting tag $TAG due to failed release"
            git push origin --delete "$TAG" || true
          fi
