name: Publish to PyPI (manual tag)

# Fallback workflow: triggers when you manually push a tag (e.g. git tag v0.2.7 && git push origin v0.2.7).
# For automated releases, use the Auto Release workflow (merge a PR with a "release" label).

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install build tools
        run: pip install build

      - name: Build Python package
        run: python -m build

      - name: Verify static assets are bundled
        run: |
          python - <<'EOF'
          import zipfile, sys
          whl = next(__import__('pathlib').Path('dist').glob('*.whl'))
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
          has_html = any('static/index.html' in n for n in names)
          has_js   = any('static/assets' in n and n.endswith('.js') for n in names)
          if not (has_html and has_js):
              print("ERROR: static assets missing from wheel!", file=sys.stderr)
              sys.exit(1)
          print(f"OK: {whl.name} contains static assets.")
          EOF

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
