name: Publish to PyPI (manual tag)

# Fallback workflow for manual tag pushes: git tag v0.2.7 && git push origin v0.2.7
# For automated releases, merge a PR with a "release" label instead.
#
# This workflow skips tags created by the Auto Release workflow to prevent
# double-publishing. Auto Release handles its own build + publish.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build and publish
    # Skip if the tag was pushed by the Auto Release workflow (github-actions bot)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Skip if release already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "::error::Release ${{ github.ref_name }} already exists — skipping to prevent double publish."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version-file: ".python-version"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install build tools
        run: pip install --upgrade build setuptools wheel

      - name: Build Python package
        run: python -m build

      - name: Verify wheel metadata and static assets
        run: |
          python - <<'EOF'
          import zipfile, sys
          from pathlib import Path

          whl = next(Path('dist').glob('*.whl'))

          with zipfile.ZipFile(whl) as z:
              names = z.namelist()

              # Check metadata
              metadata_files = [n for n in names if n.endswith('/METADATA')]
              if not metadata_files:
                  print("ERROR: No METADATA file found in wheel!", file=sys.stderr)
                  sys.exit(1)

              metadata = z.read(metadata_files[0]).decode()
              if 'Name:' not in metadata or 'Version:' not in metadata:
                  print(f"ERROR: METADATA missing Name or Version:\n{metadata[:500]}", file=sys.stderr)
                  sys.exit(1)

              # Check static assets
              has_html = any('static/index.html' in n for n in names)
              has_js = any('static/assets' in n and n.endswith('.js') for n in names)
              if not (has_html and has_js):
                  print("ERROR: static assets missing from wheel!", file=sys.stderr)
                  sys.exit(1)

          print(f"OK: {whl.name} — metadata and static assets verified.")
          EOF

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ec4db0b4ddc65acdf4bff5fa45ac92d78b56bdf0 # v1.9.0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
